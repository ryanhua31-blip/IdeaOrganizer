<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gatherboard Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260620-whiteboard-tools" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Categories">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Gatherboard</h1>
            <p>Sort notes, boards, tasks, and loose ideas.</p>
          </div>
        </div>

        <form class="quick-add" id="categoryForm">
          <label for="categoryInput">New category</label>
          <div class="input-row">
            <input id="categoryInput" name="category" type="text" placeholder="Project, client, week..." autocomplete="off" />
            <button class="icon-button" type="submit" aria-label="Add category" title="Add category">+</button>
          </div>
        </form>

        <nav class="category-list" id="categoryList"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Current space</p>
            <h2 id="activeCategoryName"></h2>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="renameCategoryButton" type="button">Rename</button>
            <button class="danger-button" id="deleteCategoryButton" type="button">Delete</button>
          </div>
        </header>

        <section class="composer" aria-label="Add an item">
          <form id="itemForm">
            <div class="field-grid">
              <label>
                Item type
                <select id="itemType">
                  <option value="note">Random note</option>
                  <option value="task">Task list</option>
                  <option value="board">Whiteboard</option>
                  <option value="link">Reference</option>
                </select>
              </label>
              <label>
                Title
                <input id="itemTitle" type="text" placeholder="What is this about?" autocomplete="off" />
              </label>
            </div>
            <label>
              Details
              <textarea id="itemBody" rows="4" placeholder="Drop the thought, checklist, source, or sketch idea here."></textarea>
            </label>
            <div class="composer-actions">
              <p id="composerHint">Use short titles so everything stays easy to scan.</p>
              <button type="submit">Add item</button>
            </div>
          </form>
        </section>

        <section class="filters" aria-label="Item filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="note">Notes</button>
          <button class="filter-button" type="button" data-filter="task">Tasks</button>
          <button class="filter-button" type="button" data-filter="board">Boards</button>
          <button class="filter-button" type="button" data-filter="link">References</button>
        </section>

        <section class="board-area" id="itemGrid" aria-live="polite"></section>
      </main>
    </div>

    <div class="modal-backdrop" id="boardModal" hidden>
      <section class="whiteboard-modal" role="dialog" aria-modal="true" aria-labelledby="boardModalTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Whiteboard</p>
            <h2 id="boardModalTitle">Sketch board</h2>
          </div>
          <button class="tiny-button" id="closeBoardButton" type="button" aria-label="Close whiteboard" title="Close">×</button>
        </header>

        <div class="whiteboard-tools" aria-label="Whiteboard tools">
          <button class="swatch active" type="button" data-color="#1f2933" style="--swatch-color: #1f2933; background: #1f2933" aria-label="Black ink" title="Black"></button>
          <button class="swatch" type="button" data-color="#1f8a83" style="--swatch-color: #1f8a83; background: #1f8a83" aria-label="Teal ink" title="Teal"></button>
          <button class="swatch" type="button" data-color="#d65a45" style="--swatch-color: #d65a45; background: #d65a45" aria-label="Coral ink" title="Coral"></button>
          <button class="swatch" type="button" data-color="#7763c5" style="--swatch-color: #7763c5; background: #7763c5" aria-label="Violet ink" title="Violet"></button>
          <button class="swatch" type="button" data-color="#2563eb" style="--swatch-color: #2563eb; background: #2563eb" aria-label="Blue ink" title="Blue"></button>
          <button class="swatch" type="button" data-color="#16a34a" style="--swatch-color: #16a34a; background: #16a34a" aria-label="Green ink" title="Green"></button>
          <button class="swatch" type="button" data-color="#f59e0b" style="--swatch-color: #f59e0b; background: #f59e0b" aria-label="Yellow ink" title="Yellow"></button>
          <button class="swatch" type="button" data-color="#dc2626" style="--swatch-color: #dc2626; background: #dc2626" aria-label="Red ink" title="Red"></button>
          <button class="swatch" type="button" data-color="#ffffff" style="--swatch-color: #ffffff; background: #ffffff" aria-label="White ink" title="White"></button>
          <button class="tool-button icon-tool" id="eraserButton" type="button" aria-label="Use eraser" title="Eraser">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 15.5 14.5 5a2.1 2.1 0 0 1 3 0L20 7.5a2.1 2.1 0 0 1 0 3L11.5 19H6.8L4 16.2v-.7Z" />
              <path d="M13 6.5 18.5 12" />
              <path d="M3.8 19h16.4" />
            </svg>
          </button>
          <label class="size-control">
            Size
            <input id="brushSize" type="range" min="2" max="18" value="5" />
          </label>
          <button class="ghost-button" id="clearBoardButton" type="button">Clear</button>
          <button class="ghost-button" id="saveBoardButton" type="button">Save</button>
        </div>

        <canvas id="boardCanvas" width="1200" height="720"></canvas>
      </section>
    </div>

    <template id="categoryTemplate">
      <button class="category-button" type="button">
        <span class="category-color"></span>
        <span class="category-name"></span>
        <span class="category-count"></span>
      </button>
    </template>

    <template id="itemTemplate">
      <article class="item-card">
        <div class="item-card-header">
          <span class="type-pill"></span>
          <div class="card-actions">
            <button class="tiny-button move-up" type="button" aria-label="Move item up" title="Move up">↑</button>
            <button class="tiny-button move-down" type="button" aria-label="Move item down" title="Move down">↓</button>
            <button class="tiny-button delete-item" type="button" aria-label="Delete item" title="Delete">×</button>
          </div>
        </div>
        <h3></h3>
        <div class="custom-panel"></div>
        <p class="item-body"></p>
      </article>
    </template>

    <script src="script.js?v=20260620-whiteboard-tools"></script>
  </body>
</html>
